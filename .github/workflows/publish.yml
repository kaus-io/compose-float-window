name: Release

on:
  release:
    types: [released, prereleased]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.2). Leave empty to derive from the triggered tag.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 25

      - uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Resolve release version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to Maven Central
        run: ./gradlew publishToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_version: ${{ steps.version.outputs.value }}

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find library \
            -name '*.aar' -not -path '*/tmp/*' -exec cp {} artifacts/ \;
          find library \
            -name '*.jar' -not -path '*/tmp/*' -exec cp {} artifacts/ \;
          find library \
            -name '*.module' -not -path '*/tmp/*' -exec cp {} artifacts/ \;

      - name: Upload publish artifacts
        uses: actions/upload-artifact@v5
        with:
          name: compose-float-window-artifacts
          path: artifacts/*
          if-no-files-found: warn

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: ${{ github.event.release.name }}
          body: ${{ github.event.release.body }}
          files: artifacts/*
